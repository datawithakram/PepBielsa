services:
  - type: web
    name: pepbielsa-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_CHANNEL_ID
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: NEWS_POLL_MINUTES
        value: "30"
      - key: BREAKING_POLL_MINUTES
        value: "10"
      - key: PORT
        value: "10000"
